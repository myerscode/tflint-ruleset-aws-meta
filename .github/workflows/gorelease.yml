name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.5.0)'
        required: true
        type: string
  push:
    tags:
      - v*.*.*

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: main
        fetch-depth: 0
        token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
        persist-credentials: true

    - name: Determine version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
          # Strip leading v if provided
          VERSION="${VERSION#v}"
          TAG="v${VERSION}"
        else
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
        fi
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Validate semver format
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "Error: Version must be in SemVer format MAJOR.MINOR.PATCH (e.g. 0.5.0)"
          exit 1
        fi

    - name: Create and push tag
      if: github.event_name == 'workflow_dispatch'
      run: |
        git tag "${{ steps.version.outputs.tag }}"
        git push origin "${{ steps.version.outputs.tag }}"

  goreleaser:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ needs.prepare.outputs.tag }}
        fetch-depth: 0
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v7
      with:
        version: latest
        args: release
      env:
        GITHUB_TOKEN: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
    - uses: actions/attest-build-provenance@v4
      with:
        subject-path: 'dist/checksums.txt'

  update-docs:
    needs: [prepare, goreleaser]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: main
        fetch-depth: 0
        token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
        persist-credentials: true

    - name: Update version in docs
      run: |
        VERSION="${{ needs.prepare.outputs.version }}"
        sed -i "s/version = \"[0-9]*\.[0-9]*\.[0-9]*\"/version = \"${VERSION}\"/g" README.md
        sed -i "s/version = \"[0-9]*\.[0-9]*\.[0-9]*\"/version = \"${VERSION}\"/g" docs-site/src/content/docs/installation.md
        sed -i "s/version = \"[0-9]*\.[0-9]*\.[0-9]*\"/version = \"${VERSION}\"/g" docs-site/src/content/docs/configuration.md

    - name: Update changelog
      uses: requarks/changelog-action@v1
      with:
        token: ${{ github.token }}
        tag: ${{ needs.prepare.outputs.tag }}

    - name: Commit and push
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        branch: main
        commit_message: "docs: update version and changelog for ${{ needs.prepare.outputs.version }}"
        file_pattern: README.md docs-site/src/content/docs/installation.md docs-site/src/content/docs/configuration.md CHANGELOG.md
